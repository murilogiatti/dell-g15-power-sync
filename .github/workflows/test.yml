name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Run Shellcheck
        run: shellcheck bin/g15-daemon.sh bin/g15-cycle.sh install.sh uninstall.sh

      - name: Run Bats Tests
        run: bats tests/
